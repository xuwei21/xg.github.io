<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>梦猫人 · 永恒臻藏</title>
    <!-- 预连接 & 高级字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升视觉纯粹感，可选 */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0a0a0c 0%, #030303 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', 'Times New Roman', '宋体', 'Noto Serif SC', serif;
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }

        /* 奢华底纹 —— 微织金砂噪点 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(212, 175, 55, 0.08) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* 动态流光粒子背景 (高级悬浮微粒，不断重复飘移) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.02) 0%, transparent 50%);
            pointer-events: none;
            animation: driftGlow 24s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes driftGlow {
            0% {
                opacity: 0.3;
                transform: scale(1) translateX(-2%);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.02) translateX(2%);
            }
            100% {
                opacity: 0.3;
                transform: scale(1) translateX(-2%);
            }
        }

        /* 主视觉容器 —— 光环与卡片层叠 */
        .luxury-stage {
            position: relative;
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* ========= 无限重复光环系统 (旋转 + 脉冲) ========= */
        .halo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 基础光环样式 —— 金纹永恒旋转 */
        .orb {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2), inset 0 0 12px rgba(212, 175, 55, 0.1);
            will-change: transform, opacity;
        }

        /* 大光环 —— 优雅逆时针旋转 (重复) */
        .halo-master {
            width: 520px;
            height: 520px;
            border: 1.5px solid rgba(212, 175, 55, 0.45);
            border-top-color: rgba(212, 175, 55, 0.85);
            border-right-color: rgba(212, 175, 55, 0.25);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.02) 0%, transparent 70%);
            animation: rotateAntiClockwise 28s infinite linear;
        }

        /* 中光环 —— 顺时针旋转，错落层次 */
        .halo-prince {
            width: 400px;
            height: 400px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-bottom-color: rgba(212, 175, 55, 0.9);
            border-left-color: rgba(212, 175, 55, 0.2);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            animation: rotateClockwise 22s infinite linear;
        }

        /* 内光环 —— 双重动效：旋转 + 呼吸脉冲 (不断重复) */
        .halo-jewel {
            width: 280px;
            height: 280px;
            border: 1px solid rgba(212, 175, 55, 0.7);
            border-top: 2px solid rgba(230, 195, 80, 0.9);
            box-shadow: 0 0 28px rgba(212, 175, 55, 0.3);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0, 0, 0, 0) 80%);
            animation: rotateAntiClockwise 14s infinite linear, pulseBreathing 3s infinite ease-in-out;
        }

        /* 极细装饰环 —— 微旋光晕，极致重复 */
        .halo-whisper {
            width: 180px;
            height: 180px;
            border: 0.5px solid rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            background: transparent;
            animation: rotateClockwise 10s infinite linear;
            opacity: 0.7;
        }

        @keyframes rotateClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateAntiClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* 脉冲呼吸动效 (无限重复，优雅奢侈品感) */
        @keyframes pulseBreathing {
            0% {
                transform: scale(1);
                opacity: 0.7;
                border-color: rgba(212, 175, 55, 0.5);
                box-shadow: 0 0 18px rgba(212, 175, 55, 0.2);
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
                border-color: rgba(230, 195, 80, 0.9);
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
            }
            100% {
                transform: scale(1);
                opacity: 0.7;
                border-color: rgba(212, 175, 55, 0.5);
                box-shadow: 0 0 18px rgba(212, 175, 55, 0.2);
            }
        }

        /* 主卡片 —— 奢华玻璃质感 */
        .dream-card {
            position: relative;
            background: rgba(8, 8, 12, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 3.2rem 4.2rem;
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.2) inset, 0 0 28px rgba(212, 175, 55, 0.2);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: fit-content;
            min-width: 320px;
        }

        .dream-card:hover {
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(230, 195, 80, 0.4) inset, 0 0 38px rgba(212, 175, 55, 0.3);
            background: rgba(8, 8, 12, 0.75);
        }

        /* 主标题文字 —— 璀璨金纹 */
        .hero-text {
            font-size: clamp(3rem, 10vw, 5.6rem);
            font-weight: 500;
            font-family: 'Cormorant Garamond', 'Times New Roman', 'Noto Serif SC', serif;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #e6d5a8 0%, #c9a54b 30%, #f3e5ab 60%, #b88b2f 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4), 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.75rem;
            white-space: nowrap;
            animation: shimmerGold 6s infinite linear, subtleFloat 4s infinite ease-in-out;
        }

        /* 金辉流动 — 不断重复的光泽扫掠 (高级动效) */
        @keyframes shimmerGold {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 文字优雅悬浮 (重复优雅起伏) */
        @keyframes subtleFloat {
            0% {
                transform: translateY(0px);
                text-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 10px rgba(212,175,55,0.2);
            }
            50% {
                transform: translateY(-3px);
                text-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.5);
            }
            100% {
                transform: translateY(0px);
                text-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 10px rgba(212,175,55,0.2);
            }
        }

        /* 奢华装饰线 + 细腻分隔符 */
        .luxury-divider {
            width: 90px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.7), rgba(230,195,80,0.9), rgba(212,175,55,0.7), transparent);
            margin: 1.2rem auto 1rem auto;
            border-radius: 4px;
            animation: dividerBreathing 3s infinite ease-in-out;
        }

        @keyframes dividerBreathing {
            0% {
                width: 80px;
                opacity: 0.6;
                box-shadow: 0 0 2px rgba(212,175,55,0.3);
            }
            50% {
                width: 120px;
                opacity: 1;
                box-shadow: 0 0 8px rgba(212,175,55,0.7);
            }
            100% {
                width: 80px;
                opacity: 0.6;
                box-shadow: 0 0 2px rgba(212,175,55,0.3);
            }
        }

        /* 优雅副文案 / 细金质感 */
        .sub-caption {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.75);
            margin-top: 1.2rem;
            word-break: keep-all;
            backdrop-filter: blur(2px);
            display: inline-block;
            border-top: 0.5px solid rgba(212, 175, 55, 0.4);
            border-bottom: 0.5px solid rgba(212, 175, 55, 0.4);
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            animation: fadePulse 4s infinite alternate;
        }

        @keyframes fadePulse {
            0% {
                opacity: 0.5;
                letter-spacing: 0.25rem;
            }
            100% {
                opacity: 1;
                letter-spacing: 0.35rem;
                color: rgba(230, 195, 80, 0.95);
            }
        }

        /* 侧翼装饰小菱形 (无限旋转 + 重复闪烁) */
        .diamond-dust {
            position: absolute;
            top: -15px;
            right: -20px;
            width: 45px;
            height: 45px;
            opacity: 0.6;
            pointer-events: none;
            animation: spinDiamond 8s infinite linear, glitter 2.2s infinite alternate;
        }
        .diamond-dust.left {
            left: -20px;
            right: auto;
            top: auto;
            bottom: -18px;
            animation: spinDiamondReverse 10s infinite linear, glitter 2.4s infinite alternate;
        }
        .diamond-dust svg {
            filter: drop-shadow(0 0 4px rgba(212,175,55,0.6));
        }

        @keyframes spinDiamond {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spinDiamondReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes glitter {
            0% { opacity: 0.3; filter: drop-shadow(0 0 2px #d4af37);}
            100% { opacity: 0.9; filter: drop-shadow(0 0 8px #e6c350);}
        }

        /* 流动的光尘线条 (高级重复扫描线) */
        .flowing-luxury {
            position: absolute;
            bottom: 12%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), rgba(212,175,55,0.7), rgba(212,175,55,0.2), transparent);
            border-radius: 4px;
            filter: blur(1px);
            animation: flowLine 5s infinite linear;
            pointer-events: none;
            z-index: 5;
        }
        .flowing-luxury.top {
            top: 12%;
            bottom: auto;
            animation: flowLineReverse 6s infinite linear;
        }

        @keyframes flowLine {
            0% {
                transform: translateX(-30%);
                opacity: 0;
            }
            30% {
                opacity: 0.7;
            }
            70% {
                opacity: 0.7;
            }
            100% {
                transform: translateX(30%);
                opacity: 0;
            }
        }
        @keyframes flowLineReverse {
            0% {
                transform: translateX(30%);
                opacity: 0;
            }
            30% {
                opacity: 0.6;
            }
            70% {
                opacity: 0.6;
            }
            100% {
                transform: translateX(-30%);
                opacity: 0;
            }
        }

        /* 定制优雅滚动适应 */
        @media (max-width: 720px) {
            .dream-card {
                padding: 2rem 2rem;
                border-radius: 36px;
            }
            .hero-text {
                white-space: normal;
                word-break: keep-all;
                letter-spacing: 0.04em;
            }
            .halo-master { width: 380px; height: 380px; }
            .halo-prince { width: 280px; height: 280px; }
            .halo-jewel { width: 200px; height: 200px; }
            .halo-whisper { width: 130px; height: 130px; }
            .sub-caption {
                font-size: 0.65rem;
                letter-spacing: 0.2rem;
            }
            .diamond-dust {
                width: 30px;
                height: 30px;
            }
            .flowing-luxury, .flowing-luxury.top {
                width: 80%;
            }
        }

        /* 纯装饰 —— 尊贵金边聚焦 */
        .focus-glow {
            position: absolute;
            inset: 0;
            border-radius: 48px;
            background: radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 2;
            animation: glowRotate 12s infinite alternate;
        }
        @keyframes glowRotate {
            0% {
                opacity: 0.3;
                background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.1), transparent 70%);
            }
            100% {
                opacity: 0.7;
                background: radial-gradient(circle at 80% 70%, rgba(230, 195, 80, 0.2), transparent 75%);
            }
        }

        /* 保证内容始终可读，光环不被遮挡文字点击 */
        .dream-card * {
            position: relative;
            z-index: 3;
        }
    </style>
</head>
<body>

<div class="luxury-stage">
    <!-- 无限重复光环系统 —— 多重旋转 + 脉冲动效，展现高级奢侈品永恒韵律 -->
    <div class="halo-container">
        <div class="orb halo-master"></div>
        <div class="orb halo-prince"></div>
        <div class="orb halo-jewel"></div>
        <div class="orb halo-whisper"></div>
    </div>

    <!-- 流动金线 (不断重复水平运动) -->
    <div class="flowing-luxury"></div>
    <div class="flowing-luxury top"></div>

    <!-- 主卡片内容 -->
    <div class="dream-card">
        <!-- 侧翼装饰菱形 无限旋转与闪烁 -->
        <div class="diamond-dust">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15 9H22L16 14L19 21L12 17L5 21L8 14L2 9H9L12 2Z" fill="url(#goldGrad)" stroke="#d4af37" stroke-width="0.5"/>
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#F9E5AF"/>
                        <stop offset="100%" stop-color="#C6A43B"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="diamond-dust left">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15 9H22L16 14L19 21L12 17L5 21L8 14L2 9H9L12 2Z" fill="url(#goldGrad2)" stroke="#d4af37" stroke-width="0.5"/>
                <defs>
                    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#EEDD99"/>
                        <stop offset="100%" stop-color="#B88B2F"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- 核心文案：你好梦猫人 永恒呈现 -->
        <h1 class="hero-text">你好梦猫人</h1>
        <div class="luxury-divider"></div>
        <div class="sub-caption">ÉTERNITÉ · 鎏金梦境</div>
        <div class="focus-glow"></div>
    </div>
</div>

<!-- 优雅的重复光晕粒子（增强无穷韵律感） -->
<script>
    (function() {
        // 额外增加动态光尘粒子 - 不断重复生成与消散，强化奢侈品动效 (轻量级装饰)
        const bodyEl = document.body;
        const particleContainer = document.createElement('div');
        particleContainer.style.position = 'fixed';
        particleContainer.style.top = '0';
        particleContainer.style.left = '0';
        particleContainer.style.width = '100%';
        particleContainer.style.height = '100%';
        particleContainer.style.pointerEvents = 'none';
        particleContainer.style.zIndex = '1';
        particleContainer.style.overflow = 'hidden';
        bodyEl.appendChild(particleContainer);
        
        // 优雅奢华粒子效果，不断重复飘浮 (不会影响性能)
        let particleCount = 0;
        const MAX_PARTICLES = 36;
        
        function createGoldParticle() {
            if (particleCount >= MAX_PARTICLES) return;
            const particle = document.createElement('div');
            const size = Math.random() * 5 + 2;
            particle.style.position = 'absolute';
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.background = `radial-gradient(circle, rgba(212,175,55,0.8), rgba(230,195,80,0.2))`;
            particle.style.borderRadius = '50%';
            particle.style.filter = 'blur(1px)';
            particle.style.boxShadow = '0 0 6px rgba(212,175,55,0.6)';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particleContainer.appendChild(particle);
            particleCount++;
            
            // 随机飘移动画 (重复不断)
            const duration = 12 + Math.random() * 15;
            const angle = Math.random() * Math.PI * 2;
            const distance = 70 + Math.random() * 100;
            const deltaX = Math.cos(angle) * distance;
            const deltaY = Math.sin(angle) * distance;
            
            particle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: parseFloat(particle.style.opacity) },
                { transform: `translate(${deltaX}px, ${deltaY}px) scale(1.4)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                iterations: 1,
                easing: 'cubic-bezier(0.2, 0.9, 0.4, 1)',
                fill: 'forwards'
            }).onfinish = () => {
                particle.remove();
                particleCount--;
                // 无限重复制造新的粒子
                setTimeout(() => createGoldParticle(), 500 + Math.random() * 1500);
            };
        }
        
        // 初始生成粒子，并无限循环再生，达成不断重复的奢华光尘动效
        for (let i = 0; i < 18; i++) {
            setTimeout(() => createGoldParticle(), i * 400);
        }
        
        // 动态调整粒子适配窗口resize，不需要复杂逻辑，保留优雅
        window.addEventListener('resize', () => {
            // 无需额外处理，粒子会自然消失重建，不干扰现有光环
        });
    })();
</script>

<!-- 设计说明：整体采用高级奢侈品基调 —— 黑金配色，细腻噪点底纹，多重无限旋转光环，
     脉冲呼吸光环，流动光尘线条，文字流光渐变与悬浮动效，钻石菱形旋转闪烁，所有动效均为无限重复，
     完美呈现“你好梦猫人”的华美意境。 -->
</body>
</html>
